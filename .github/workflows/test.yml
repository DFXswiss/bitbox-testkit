name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: unit tests (no simulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race -timeout 60s ./...

  simulator:
    name: simulator integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: cache simulator binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/wallet-testkit-simulators
          key: bitbox-simulators-${{ hashFiles('bitbox/simulator/embedded.go') }}
          restore-keys: |
            bitbox-simulators-
      - name: install stdbuf
        run: which stdbuf || sudo apt-get install -y coreutils
      - name: run simulator-tagged tests
        env:
          WALLET_TESTKIT_SIMCACHE: ${{ github.workspace }}/.simcache
        run: |
          mkdir -p "$WALLET_TESTKIT_SIMCACHE"
          go test -tags simulator -timeout 5m ./bitbox/simulator/...
